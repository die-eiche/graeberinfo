<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR-Codes – Grabbuch</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 2rem; background: #f5f5f5; }
    .card { background: #fff; border-radius: 12px; padding: 1.5rem; margin: 1.5rem auto; max-width: 360px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    img { max-width: 280px; width: 100%; height: auto; }
    h1 { font-size: 1.3rem; }
    h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    p { color: #444; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>QR-Codes</h1>

  <div class="card">
    <h2>WLAN „Kolumbarium“</h2>
    <img src="qr/wlan-kolumbarium.png" alt="WLAN QR-Code">
    <p>Mit dem iPhone-Kamera-App scannen → WLAN verbinden</p>
  </div>

  <div class="card">
    <h2>Grabsuche</h2>
    <img src="qr/grabsuche.png" alt="Grabsuche QR-Code">
    <p><a href="http://192.168.1.149/grabbuch/suche/">http://192.168.1.149/grabbuch/suche/</a></p>
  </div>
</body>
</html>
