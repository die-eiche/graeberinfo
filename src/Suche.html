<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>Grabsuche</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .bild-anzeige {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      width: 100dvw;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .bild-anzeige img {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center;
    }
  </style>
</head>
<body>
  <div class="bild-anzeige">
    <img id="plan-bild" src="" alt="Grundriss">
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var bild = document.getElementById('plan-bild');
      var src = params.get('src') || params.get('bild') || params.get('img') || '';

      if (src) {
        bild.src = src;
      }

      bild.addEventListener('error', function () {
        bild.alt = 'Bild konnte nicht geladen werden';
      });

      function vollbildAnpassen() {
        document.documentElement.style.height = window.innerHeight + 'px';
      }

      window.addEventListener('resize', vollbildAnpassen);
      window.addEventListener('orientationchange', vollbildAnpassen);
      vollbildAnpassen();
    })();
  </script>
</body>
</html>
