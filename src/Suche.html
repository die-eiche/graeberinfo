<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>Grabsuche</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .bild-anzeige {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      width: 100dvw;
      overflow: hidden;
      background: #000;
      touch-action: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .bild-viewport {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    .bild-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center center;
      will-change: transform;
      touch-action: none;
    }

    .bild-content img {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div class="bild-anzeige">
    <div class="bild-viewport" id="bild-viewport">
      <div class="bild-content" id="bild-content">
        <img id="plan-bild" src="" alt="Grundriss">
      </div>
    </div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var content = document.getElementById('bild-content');
      var bild = document.getElementById('plan-bild');
      var src = params.get('src') || params.get('bild') || params.get('img') || '';

      var scale = 1;
      var minScale = 1;
      var maxScale = 6;
      var posX = 0;
      var posY = 0;

      var pinchStartDistance = 0;
      var pinchStartScale = 1;
      var pinchStartX = 0;
      var pinchStartY = 0;
      var panStartX = 0;
      var panStartY = 0;
      var panOriginX = 0;
      var panOriginY = 0;
      var isPanning = false;
      var isPinching = false;

      if (src) {
        bild.src = src;
      }

      bild.addEventListener('error', function () {
        bild.alt = 'Bild konnte nicht geladen werden';
      });

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function touchDistance(touches) {
        var dx = touches[0].clientX - touches[1].clientX;
        var dy = touches[0].clientY - touches[1].clientY;
        return Math.hypot(dx, dy);
      }

      function touchCenter(touches) {
        return {
          x: (touches[0].clientX + touches[1].clientX) / 2,
          y: (touches[0].clientY + touches[1].clientY) / 2
        };
      }

      function applyTransform() {
        if (scale <= minScale) {
          scale = minScale;
          posX = 0;
          posY = 0;
        }
        content.style.transform = 'translate3d(' + posX + 'px, ' + posY + 'px, 0) scale(' + scale + ')';
      }

      function resetTransform() {
        scale = minScale;
        posX = 0;
        posY = 0;
        applyTransform();
      }

      function startPinch(touches) {
        isPinching = true;
        isPanning = false;
        pinchStartDistance = touchDistance(touches);
        pinchStartScale = scale;
        var center = touchCenter(touches);
        pinchStartX = center.x;
        pinchStartY = center.y;
        panOriginX = posX;
        panOriginY = posY;
      }

      function updatePinch(touches) {
        if (!pinchStartDistance) {
          startPinch(touches);
          return;
        }

        var distance = touchDistance(touches);
        var nextScale = clamp(pinchStartScale * (distance / pinchStartDistance), minScale, maxScale);
        var center = touchCenter(touches);
        var scaleRatio = nextScale / pinchStartScale;

        posX = panOriginX + (center.x - pinchStartX);
        posY = panOriginY + (center.y - pinchStartY);

        if (nextScale > minScale) {
          var viewport = document.getElementById('bild-viewport');
          var viewRect = viewport.getBoundingClientRect();
          var focusX = pinchStartX - viewRect.left - viewRect.width / 2;
          var focusY = pinchStartY - viewRect.top - viewRect.height / 2;
          posX -= focusX * (scaleRatio - 1);
          posY -= focusY * (scaleRatio - 1);
        }

        scale = nextScale;
        applyTransform();
      }

      function startPan(touch) {
        isPanning = true;
        panStartX = touch.clientX;
        panStartY = touch.clientY;
        panOriginX = posX;
        panOriginY = posY;
      }

      function updatePan(touch) {
        posX = panOriginX + (touch.clientX - panStartX);
        posY = panOriginY + (touch.clientY - panStartY);
        applyTransform();
      }

      function onTouchStart(event) {
        if (event.touches.length === 2) {
          event.preventDefault();
          startPinch(event.touches);
          return;
        }

        if (event.touches.length === 1 && scale > minScale) {
          startPan(event.touches[0]);
        }
      }

      function onTouchMove(event) {
        if (event.touches.length === 2) {
          event.preventDefault();
          updatePinch(event.touches);
          return;
        }

        if (event.touches.length === 1 && isPanning && scale > minScale) {
          event.preventDefault();
          updatePan(event.touches[0]);
        }
      }

      function onTouchEnd(event) {
        if (event.touches.length < 2) {
          isPinching = false;
          pinchStartDistance = 0;
        }

        if (event.touches.length === 1 && scale > minScale) {
          startPan(event.touches[0]);
          return;
        }

        if (event.touches.length === 0) {
          isPanning = false;
          isPinching = false;
          pinchStartDistance = 0;
          if (scale <= minScale) {
            resetTransform();
          }
        }
      }

      document.addEventListener('touchstart', onTouchStart, { passive: false, capture: true });
      document.addEventListener('touchmove', onTouchMove, { passive: false, capture: true });
      document.addEventListener('touchend', onTouchEnd, { passive: false, capture: true });
      document.addEventListener('touchcancel', onTouchEnd, { passive: false, capture: true });

      function vollbildAnpassen() {
        document.documentElement.style.height = window.innerHeight + 'px';
        applyTransform();
      }

      bild.addEventListener('load', applyTransform);
      window.addEventListener('resize', vollbildAnpassen);
      window.addEventListener('orientationchange', vollbildAnpassen);
      vollbildAnpassen();
    })();
  </script>
</body>
</html>
