name: Flight-Tracker Dashboard (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'flight-tracker/**'
      - '.github/workflows/deploy-flight-tracker-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-flight-tracker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Dashboard hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: flight-tracker

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
