name: Thailand Flug-Tracker Dashboard (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'thailand-flug-tracker/**'
      - '.github/workflows/deploy-flight-tracker-pages.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ["Tägliche Flugpreis-Aktualisierung"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-flight-tracker
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Dashboard hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: thailand-flug-tracker

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
