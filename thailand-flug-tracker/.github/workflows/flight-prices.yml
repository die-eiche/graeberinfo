name: Tägliche Flugpreis-Aktualisierung

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Flugpreise abrufen
        run: python fetch_prices.py

      - name: Preisprognose berechnen
        run: python predict_trend.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Keine Preisänderungen"
          else
            git commit -m "Flugpreise aktualisiert $(date -u +%Y-%m-%d)"
            git push
          fi
