name: Thailand Flug-Tracker Dashboard (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '!.github/workflows/flight-prices.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-thailand-flug-tracker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Dashboard hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
