<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ehrenamt Dienstplan</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2933;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    button {
      border: 1px solid #cbd2d9;
      background: #fff;
      border-radius: 0.4rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
    }

    .day-card {
      background: #fff;
      border: 1px solid #d9e2ec;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 0.8rem;
    }

    .day-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .staff {
      line-height: 1.5;
    }

    .note {
      color: #7b8794;
      font-style: italic;
    }

    .error {
      background: #fff5f5;
      border: 1px solid #f5c2c7;
      border-radius: 0.5rem;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Ehrenamt Dienstplan</h1>
        <p id="subtitle">Nächste 10 Tage ab heute</p>
      </div>
      <button id="refresh" type="button">Aktualisieren</button>
    </header>
    <div id="content"></div>
  </main>

  <script>
    const content = document.getElementById('content');
    const refreshButton = document.getElementById('refresh');

    function renderDays(data) {
      content.innerHTML = data.days.map(day => `
        <section class="day-card">
          <div class="day-title">${day.weekday}, ${day.date}</div>
          <div class="staff">
            ${day.staff.length ? day.staff.join(', ') : `<span class="note">${day.note || 'Kein Dienst eingetragen.'}</span>`}
          </div>
        </section>
      `).join('');
    }

    async function loadData() {
      content.innerHTML = '<p>Lade Dienste…</p>';
      refreshButton.disabled = true;

      try {
        const response = await fetch('/api/dienste?t=' + Date.now());
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Fehler beim Laden');
        }

        renderDays(data);
      } catch (error) {
        content.innerHTML = `<div class="error"><strong>Fehler:</strong> ${error.message}</div>`;
      } finally {
        refreshButton.disabled = false;
      }
    }

    refreshButton.addEventListener('click', loadData);
    loadData();
  </script>
</body>
</html>
